<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sinequa Auth Playground</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem("playground.theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <style>
      :root {
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-2: #f1f3f5;
        --border: #e3e6ea;
        --text: #1c2024;
        --muted: #6b7280;
        --accent: #4f46e5;
        --accent-weak: #eef0fe;
        --green: #16a34a;
        --green-weak: #e7f6ec;
        --red: #dc2626;
        --red-weak: #fdecec;
        --amber: #b45309;
        --console-bg: #0f1117;
        --console-text: #d6dae0;
        --radius: 12px;
        --radius-sm: 8px;
        --shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 4px 16px rgba(16, 24, 40, 0.06);
        --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, monospace;
      }
      /* Dark palette — applied when forced via [data-theme="dark"] OR when the system prefers
         dark and the user hasn't forced light. */
      :root[data-theme="dark"] {
        --bg: #0b0d12; --surface: #14171d; --surface-2: #1b1f27; --border: #272c36;
        --text: #e6e9ee; --muted: #9aa3b2; --accent: #818cf8; --accent-weak: #1e2030;
        --green: #4ade80; --green-weak: #14241a; --red: #f87171; --red-weak: #2a1717;
        --amber: #fbbf24; --console-bg: #0a0c10; --console-text: #cdd3db;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 6px 20px rgba(0, 0, 0, 0.35);
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --bg: #0b0d12; --surface: #14171d; --surface-2: #1b1f27; --border: #272c36;
          --text: #e6e9ee; --muted: #9aa3b2; --accent: #818cf8; --accent-weak: #1e2030;
          --green: #4ade80; --green-weak: #14241a; --red: #f87171; --red-weak: #2a1717;
          --amber: #fbbf24; --console-bg: #0a0c10; --console-text: #cdd3db;
          --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 6px 20px rgba(0, 0, 0, 0.35);
        }
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }

      /* ---- Thin, theme-aware scrollbars ---- */
      * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
      *::-webkit-scrollbar { width: 10px; height: 10px; }
      *::-webkit-scrollbar-track { background: transparent; }
      *::-webkit-scrollbar-thumb {
        background: var(--border); border-radius: 999px;
        border: 3px solid transparent; background-clip: content-box;
      }
      *::-webkit-scrollbar-thumb:hover { background: var(--muted); background-clip: content-box; }
      *::-webkit-scrollbar-corner { background: transparent; }
      /* Dark console gets a lighter thumb so it stays visible on its near-black surface. */
      #log { scrollbar-color: rgba(255, 255, 255, 0.18) transparent; }
      #log::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.18); background-clip: content-box; }
      #log::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.32); background-clip: content-box; }
      body {
        margin: 0;
        font-family: var(--font);
        color: var(--text);
        background: var(--bg);
        font-size: 14px;
        line-height: 1.45;
      }

      /* ---- App shell ---- */
      .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }

      header.topbar {
        display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        padding: 10px 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      .topbar .logo { font-size: 20px; }
      .topbar .titles { display: flex; flex-direction: column; }
      .topbar h1 { font-size: 15px; font-weight: 650; margin: 0; letter-spacing: -0.01em; }
      .topbar .sub { font-size: 12px; color: var(--muted); margin: 0; }
      .topbar .spacer { flex: 1; }
      .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .toolbar .sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
      .badge {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 11px; font-weight: 600; padding: 4px 10px;
        border-radius: 999px; background: var(--surface-2); color: var(--muted);
        border: 1px solid var(--border); white-space: nowrap;
      }
      .badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

      .layout { display: grid; grid-template-columns: 320px 1fr; min-height: 0; }

      /* ---- Sidebar ---- */
      aside {
        border-right: 1px solid var(--border);
        background: var(--surface);
        overflow-y: auto; padding: 16px;
        display: flex; flex-direction: column; gap: 18px;
      }
      .group-title {
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.06em; color: var(--muted); margin: 0 0 8px 2px;
      }
      .scenario {
        display: flex; gap: 10px; align-items: flex-start; width: 100%; text-align: left;
        padding: 10px 12px; margin-bottom: 6px; cursor: pointer;
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
        transition: background 0.12s, border-color 0.12s, transform 0.04s;
        font: inherit; color: inherit;
      }
      .scenario:hover { background: var(--surface-2); border-color: var(--accent); }
      .scenario:active { transform: translateY(1px); }
      .scenario.active { background: var(--accent-weak); border-color: var(--accent); box-shadow: inset 3px 0 0 var(--accent); }
      .scenario .ico { font-size: 18px; line-height: 1.2; flex-shrink: 0; }
      .scenario .body { min-width: 0; }
      .scenario .name { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; }
      .scenario .desc { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
      .chip {
        font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 999px;
        background: var(--surface-2); color: var(--muted); border: 1px solid var(--border);
      }

      .session-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
      .switch { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 12.5px; user-select: none; }
      .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
      .switch .track {
        position: relative; width: 36px; height: 20px; border-radius: 999px;
        background: var(--border); transition: background 0.15s; flex-shrink: 0;
      }
      .switch .track::after {
        content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
        border-radius: 50%; background: #fff; transition: transform 0.15s; box-shadow: 0 1px 2px rgba(0,0,0,0.3);
      }
      .switch input:checked + .track { background: var(--accent); }
      .switch input:checked + .track::after { transform: translateX(16px); }
      .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
      button.btn {
        font: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer;
        padding: 7px 12px; border-radius: var(--radius-sm);
        border: 1px solid var(--border); background: var(--surface); color: var(--text);
        transition: background 0.12s, border-color 0.12s;
      }
      button.btn:hover { background: var(--surface-2); }
      button.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.btn.primary:hover { filter: brightness(1.05); }
      button.btn.icon-btn { padding: 7px 10px; font-size: 15px; line-height: 1; }

      /* ---- Content ---- */
      main { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
      .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
      .card.pad { padding: 16px; }
      .card-head { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 12px; }

      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
      .stat { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; min-width: 0; }
      .stat .k { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
      .stat .v { font-family: var(--mono); font-size: 12.5px; margin-top: 4px; word-break: break-word; }
      .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-weight: 700; font-size: 12px; }
      .pill.ok { background: var(--green-weak); color: var(--green); }
      .pill.no { background: var(--red-weak); color: var(--red); }

      form#creds-form { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      form#creds-form label { font-size: 12px; color: var(--muted); }
      input.field {
        font: inherit; font-size: 13px; padding: 7px 10px; border-radius: var(--radius-sm);
        border: 1px solid var(--border); background: var(--surface-2); color: var(--text); min-width: 130px;
      }
      input.field:focus { outline: 2px solid var(--accent); outline-offset: -1px; }

      .console-card { flex: 1; display: flex; flex-direction: column; min-height: 200px; overflow: hidden; }
      .console-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); }
      .console-head .title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
      #log { flex: 1; overflow-y: auto; padding: 12px 14px; background: var(--console-bg); color: var(--console-text); font-family: var(--mono); font-size: 12px; }
      #log .line { padding: 1px 0; white-space: pre-wrap; word-break: break-word; }
      #log .section { color: #fff; font-weight: 700; margin-top: 10px; padding-top: 8px; border-top: 1px solid #ffffff14; }
      #log .section:first-child { margin-top: 0; border-top: none; padding-top: 0; }
      #log .net { color: #8b93a7; }
      #log .ok { color: #5fd38a; }
      #log .err { color: #f78a8a; }
      #log .muted { color: #8b93a7; }
      .hidden { display: none; }

      @media (max-width: 860px) {
        .app { height: auto; }
        .layout { grid-template-columns: 1fr; }
        aside { border-right: none; border-bottom: 1px solid var(--border); }
        main { padding: 16px; }
        .console-card { min-height: 280px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <span class="logo">🔐</span>
        <div class="titles">
          <h1>Sinequa Auth Playground</h1>
          <p class="sub">Exercise every <code>@sinequa/atomic</code> login mode against an in-process mock backend</p>
        </div>
        <span class="spacer"></span>
        <div class="toolbar">
          <label class="switch" title="After expiry, replay the active scenario to simulate the error interceptor → signIn()">
            <input type="checkbox" id="reauth" />
            <span class="track"></span>
            <span>Re-auth after expiry</span>
          </label>
          <span class="sep"></span>
          <button class="btn" id="expire">⏱️ Expire token</button>
          <button class="btn" id="logout">🚪 Logout</button>
          <button class="btn" id="clear">🧹 Clear log</button>
          <span class="sep"></span>
          <button class="btn icon-btn" id="theme" title="Toggle light / dark theme" aria-label="Toggle theme">🌙</button>
        </div>
      </header>

      <div class="layout">
        <aside>
          <div id="scenarios"></div>
        </aside>

        <main>
          <div class="card pad">
            <div class="card-head">Status</div>
            <div class="stats">
              <div class="stat"><div class="k">Library</div><div class="v" id="s-lib">—</div></div>
              <div class="stat"><div class="k">Scenario</div><div class="v" id="s-scenario">—</div></div>
              <div class="stat"><div class="k">authMode</div><div class="v" id="s-mode">—</div></div>
              <div class="stat"><div class="k">login()</div><div class="v" id="s-login">—</div></div>
              <div class="stat"><div class="k">isAuthenticated</div><div class="v"><span class="pill no" id="s-auth">—</span></div></div>
            </div>
          </div>

          <div class="card pad hidden" id="creds-card">
            <div class="card-head">Credentials</div>
            <form id="creds-form">
              <label for="username">Username</label>
              <input class="field" id="username" placeholder="username" value="demo" />
              <label for="password">Password</label>
              <input class="field" id="password" type="password" placeholder="password" value="demo" />
              <button class="btn primary" type="submit">Sign in</button>
            </form>
          </div>

          <div class="card console-card">
            <div class="console-head">
              <span class="title">Activity log</span>
              <span class="badge" id="net-hint">network · auth flow</span>
            </div>
            <div id="log"></div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
